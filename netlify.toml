[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version" # Just to check npm version in logs

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Note: Ensure you set GEMINI_API_KEY in the Netlify UI under Site settings > Environment variables
